name: goalink
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.8
dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/mocks/
  
  fonts:
    - family: MavenPro
      fonts:
        - asset: assets/fonts/Maven_Pro/static/MavenPro-Black.ttf
          weight: 900
        - asset: assets/fonts/Maven_Pro/static/MavenPro-Bold.ttf
          weight: 700
        - asset: assets/fonts/Maven_Pro/static/MavenPro-Regular.ttf
          weight: 400
        - asset: assets/fonts/Maven_Pro/static/MavenPro-SemiBold.ttf
          weight: 600

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_app.png"
  adaptive_icon_background: "#FFFFFF" 
  adaptive_icon_foreground: "assets/images/logo_app.png"
name: goalink
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.8
dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.0.0
  cross_file: ^0.3.5+2
  image_picker: ^1.1.2
  shared_preferences: ^2.5.3

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4
  video_player: ^2.11.1
  chewie: ^1.13.0
  url_launcher: ^6.3.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/icons/
    - assets/mocks/
  
  fonts:
    - family: MavenPro
      fonts:
        - asset: assets/fonts/Maven_Pro/static/MavenPro-Black.ttf
          weight: 900
        - asset: assets/fonts/Maven_Pro/static/MavenPro-Bold.ttf
          weight: 700
        - asset: assets/fonts/Maven_Pro/static/MavenPro-Regular.ttf
          weight: 400
        - asset: assets/fonts/Maven_Pro/static/MavenPro-SemiBold.ttf
          weight: 600

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_app.png"
  adaptive_icon_background: "#FFFFFF" 
  adaptive_icon_foreground: "assets/images/logo_app.png"
